<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · Shree Yantra</title>
  <link rel="stylesheet" href="../../assets/app-shell.css" />
  <link rel="stylesheet" href="../../assets/sy-pages.css" />
  <style>
    .auth-shell {
      max-width: var(--sy-shell-max);
      margin: 0 auto;
      padding: 18px 18px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .auth-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .auth-back {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border-radius: 12px;
      border: 1px solid rgba(201,150,46,0.4);
      color: var(--sy-gold-1);
      background: rgba(8,8,22,0.6);
      cursor: pointer;
    }
    .auth-hero {
      text-align: center;
      padding: 8px 0 12px;
    }
    .auth-hero h1 {
      margin: 8px 0 6px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.16em;
      font-size: 22px;
    }
    .auth-hero p {
      margin: 0;
      color: var(--sy-text-soft);
      font-size: 13.5px;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      color: var(--sy-gold-2);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
    }
    .auth-divider::before, .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,150,46,0.45), transparent);
    }
    .social-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(10, 10, 28, 0.7);
      border: 1px solid rgba(201,150,46,0.35);
      color: var(--sy-text);
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
    }
    .social-btn:hover { border-color: var(--sy-gold-1); }
    .auth-foot {
      margin-top: 22px;
      text-align: center;
      font-size: 13px;
      color: var(--sy-text-soft);
    }
    .auth-foot a { color: var(--sy-gold-1); text-decoration: none; font-weight: 600; }
    .row-between { display: flex; justify-content: space-between; align-items: center; }
    .row-between a { color: var(--sy-gold-2); font-size: 12.5px; }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-top">
      <button class="auth-back" data-sy-go="onboarding" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span class="sy-pill">SIGN IN</span>
    </div>

    <div class="auth-hero">
      <div class="sy-brand-stack__logo" aria-label="Om">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="syOm" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"  stop-color="#fff4cc"/>
              <stop offset="55%" stop-color="#f6c64a"/>
              <stop offset="100%" stop-color="#a17613"/>
            </linearGradient>
          </defs>
          <g fill="url(#syOm)">
            <!-- Stylised Om — main body -->
            <path d="M48 38c-9 0-15 5-15 13 0 7 5 12 12 12 4 0 7-2 8-5l-3-2c-1 2-3 3-5 3-3 0-6-3-6-7s3-7 8-7c7 0 12 6 12 13s-6 14-15 14-16-7-16-16c0-3 .6-6 2-9l-4-2c-1.6 3.6-2.5 7.2-2.5 11 0 12 8.6 21 20.5 21 11.6 0 20-9 20-20 0-11-7.5-19-16-19z"/>
            <!-- Right hook -->
            <path d="M68 38c-2 0-4 1-5 3l3 2c.5-1 1.5-1.5 2.5-1.5 2 0 3 1.5 3 4 0 3-2 5-5 5l1 4c5 0 9-3 9-9 0-4.5-3-7.5-8.5-7.5z"/>
            <!-- Crescent above -->
            <path d="M50 22c5 0 9 1 12 4l-2 2c-2-2-6-3-10-3z" opacity="0.95"/>
            <!-- Bindu (dot) -->
            <circle cx="50" cy="16" r="3.2"/>
          </g>
        </svg>
      </div>
      <h1 class="sy-gold">WELCOME BACK</h1>
      <p>Sign in to continue your cosmic journey</p>
    </div>

    <form class="sy-form" id="signinForm" novalidate>
      <label class="sy-field" data-required>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><polyline points="4 4 12 13 20 4"/></svg>
        <div class="sy-field__body">
          <span class="sy-field__label">Email or Mobile</span>
          <input name="id" type="text" placeholder="you@cosmos.com or +91 ..." autocomplete="username" />
          <span class="sy-field__error">Required</span>
        </div>
      </label>

      <label class="sy-field" data-required data-min="6">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        <div class="sy-field__body">
          <span class="sy-field__label">Password</span>
          <input name="pw" type="password" placeholder="Enter your password" autocomplete="current-password" />
          <span class="sy-field__error">Password must be at least 6 characters</span>
        </div>
      </label>

      <div class="row-between">
        <label style="display:flex;align-items:center;gap:8px;color:var(--sy-text-soft);font-size:13px;">
          <input type="checkbox" id="remember" style="accent-color: var(--sy-gold-2);"> Remember me
        </label>
        <a href="#" id="forgotLink">Forgot Password?</a>
      </div>

      <button type="submit" class="sy-btn sy-btn--primary sy-mt-8">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 8l4 6 5-7 5 7 4-4-2 12H4z"/></svg>
        SIGN IN
      </button>
    </form>

    <div class="auth-divider">OR CONTINUE WITH</div>
    <div class="social-row">
      <button class="social-btn" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v3.8h5.36c-.23 1.2-.93 2.2-1.98 2.88v2.4h3.2c1.87-1.72 2.95-4.26 2.95-7.28 0-.7-.06-1.4-.18-2.06z"/><path d="M12 22c2.7 0 4.97-.9 6.62-2.42l-3.2-2.4c-.9.6-2.05.94-3.42.94-2.63 0-4.86-1.78-5.66-4.18H2.96v2.62A10 10 0 0 0 12 22z"/><path d="M6.34 13.94A5.99 5.99 0 0 1 6 12c0-.67.12-1.33.34-1.94V7.44H2.96A10 10 0 0 0 2 12c0 1.6.38 3.12 1.04 4.46z"/><path d="M12 6.06c1.47 0 2.78.5 3.82 1.5l2.85-2.85C16.97 3.2 14.7 2 12 2A10 10 0 0 0 2.96 7.44l3.38 2.62C7.14 7.83 9.37 6.06 12 6.06z"/></svg>
        Google
      </button>
      <button class="social-btn" id="appleBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 12c0-1.6.8-3 2.1-3.8-.9-1.3-2.4-2.2-4.1-2.2-1.7 0-2.3.8-3.5.8s-2-.8-3.5-.8C5.8 6 3 8.3 3 13.1c0 3 1.9 6.9 4.4 6.9 1.1 0 1.9-.7 3.1-.7s2 .7 3.1.7c2.3 0 4.1-3.8 4.1-4.7 0-.1-2.2-.9-2.2-3.3zM14 4.6c.6-.8 1.1-1.9 1-3-1 .1-2.1.7-2.8 1.5-.6.7-1.1 1.8-1 2.9 1.1.1 2.2-.6 2.8-1.4z"/></svg>
        Apple
      </button>
    </div>

    <p class="auth-foot">
      New to Shree Yantra? <a data-sy-go="register">Create Account</a>
    </p>
  </div>

  <script src="../../assets/app-shell.js"></script>
  <script>
    (function () {
      // pre-fill if remembered
      var stored = SY.getUser();
      var form = document.getElementById('signinForm');
      if (stored.id) {
        form.id.value = stored.id;
        document.getElementById('remember').checked = !!stored.remember;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!SY.validateForm(form)) {
          SY.toast('Please fix the highlighted fields', 'error');
          return;
        }
        var id = form.id.value.trim();
        var name = id.includes('@') ? id.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); }) : 'Raj';
        SY.setUser({
          id: id,
          name: name,
          remember: document.getElementById('remember').checked,
          loggedIn: true
        });
        SY.toast('Welcome back, ' + name.split(' ')[0], 'success');
        setTimeout(function () { location.href = '../welcome-page/index.html'; }, 600);
      });

      document.getElementById('forgotLink').addEventListener('click', function (e) {
        e.preventDefault();
        SY.confirm({
          title: 'Reset password?',
          message: 'We will send a reset link to your registered email.',
          confirmLabel: 'SEND LINK',
          cancelLabel: 'CANCEL'
        }).then(function (ok) {
          if (ok) SY.toast('Reset link sent to your email', 'success');
        });
      });

      function social(provider) {
        SY.setUser({ name: 'Raj Kumar', id: 'raj.kumar@cosmos.com', loggedIn: true, provider: provider });
        SY.toast('Signing in via ' + provider + '…');
        setTimeout(function () { location.href = '../welcome-page/index.html'; }, 700);
      }
      document.getElementById('googleBtn').addEventListener('click', function () { social('Google'); });
      document.getElementById('appleBtn').addEventListener('click', function () { social('Apple'); });
    })();
  </script>
</body>
</html>
