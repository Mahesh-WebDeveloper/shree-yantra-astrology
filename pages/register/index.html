<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Divine Profile · Shree Yantra</title>
  <link rel="stylesheet" href="../../assets/app-shell.css" />
  <link rel="stylesheet" href="../../assets/sy-pages.css" />
  <style>
    .reg-shell {
      max-width: var(--sy-shell-max);
      margin: 0 auto;
      padding: 18px 18px 28px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .reg-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .reg-back {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border-radius: 12px;
      border: 1px solid rgba(201,150,46,0.4);
      color: var(--sy-gold-1);
      background: rgba(8,8,22,0.6);
      cursor: pointer;
    }
    .reg-title {
      flex: 1;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 15px;
      letter-spacing: 0.18em;
    }
    .reg-stage h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 22px;
      margin: 6px 0 6px;
      text-align: center;
    }
    .reg-stage p.lead {
      margin: 0 auto 18px;
      max-width: 320px;
      text-align: center;
      color: var(--sy-text-soft);
      font-size: 13.5px;
    }
    .reg-actions { margin-top: 22px; display: flex; gap: 10px; }
    .reg-actions .sy-btn { flex: 1; min-height: 48px; padding: 12px; font-size: 12.5px; }
    .reg-progress {
      margin: 8px auto 18px;
      height: 4px;
      background: rgba(201,150,46,0.15);
      border-radius: 999px;
      max-width: 200px;
      overflow: hidden;
    }
    .reg-progress span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #fce8a8, #b87f1a);
      transition: width 240ms ease;
    }
  </style>
</head>
<body>
  <div class="reg-shell">
    <div class="reg-top">
      <button class="reg-back" id="backBtn" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="reg-title sy-gold">CREATE DIVINE PROFILE</div>
      <button class="reg-back" data-sy-go="signin" aria-label="Sign in">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

    <div class="sy-steps">
      <div class="sy-steps__dot is-active" id="d1">1</div>
      <span class="sy-steps__line"></span>
      <div class="sy-steps__dot" id="d2">2</div>
      <span class="sy-steps__line"></span>
      <div class="sy-steps__dot" id="d3">3</div>
    </div>
    <div class="reg-progress"><span id="bar" style="width:33%"></span></div>

    <!-- STEP 1: account -->
    <section class="reg-stage" id="step1">
      <h2>Your Cosmic Identity</h2>
      <p class="lead">Tell us how the universe should greet you.</p>
      <form class="sy-form" id="step1Form" novalidate>
        <label class="sy-field" data-required>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c.7-4.4 4-7 8-7s7.3 2.6 8 7"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Full Name</span>
            <input name="name" type="text" placeholder="Eg. Raj Kumar Sharma" />
            <span class="sy-field__error">Please tell us your name</span>
          </div>
        </label>
        <label class="sy-field" data-required data-email>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><polyline points="4 4 12 13 20 4"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Email</span>
            <input name="email" type="email" placeholder="you@cosmos.com" />
            <span class="sy-field__error">Enter a valid email</span>
          </div>
        </label>
        <label class="sy-field" data-required data-min="10">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92V21a1 1 0 0 1-1.11 1A19.94 19.94 0 0 1 2 4.11 1 1 0 0 1 3 3h4a1 1 0 0 1 1 .75l1.5 6a1 1 0 0 1-.27 1L7 13a16 16 0 0 0 4 4l2.25-2.23a1 1 0 0 1 1-.27l6 1.5A1 1 0 0 1 22 17z"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Mobile Number</span>
            <input name="mobile" type="tel" placeholder="+91 98XXXXXXXX" />
            <span class="sy-field__error">Enter a valid mobile number</span>
          </div>
        </label>
        <label class="sy-field" data-required data-min="8">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Create Password</span>
            <input name="password" type="password" placeholder="Min 8 characters" />
            <span class="sy-field__error">Password must be at least 8 characters</span>
          </div>
        </label>
      </form>
    </section>

    <!-- STEP 2: birth -->
    <section class="reg-stage" id="step2" hidden>
      <h2>Your Birth Details</h2>
      <p class="lead">Required for accurate kundli &amp; predictions.</p>
      <form class="sy-form" id="step2Form" novalidate>
        <div class="sy-grid-2">
          <label class="sy-field" data-required>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <div class="sy-field__body">
              <span class="sy-field__label">Date of Birth</span>
              <input name="dob" type="date" />
              <span class="sy-field__error">Required</span>
            </div>
          </label>
          <label class="sy-field" data-required>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <div class="sy-field__body">
              <span class="sy-field__label">Time of Birth</span>
              <input name="tob" type="time" />
              <span class="sy-field__error">Required</span>
            </div>
          </label>
        </div>
        <label class="sy-field" data-required>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Place of Birth</span>
            <input name="place" type="text" placeholder="Eg. Jaipur, Rajasthan" />
            <span class="sy-field__error">Required for accurate predictions</span>
          </div>
        </label>
        <label class="sy-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 1-3 3 3 3 0 0 1 3-3z"/><path d="M5 19a7 7 0 0 1 14 0"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Gender</span>
            <select name="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </label>
      </form>
    </section>

    <!-- STEP 3: preferences -->
    <section class="reg-stage" id="step3" hidden>
      <h2>What guides you?</h2>
      <p class="lead">Pick what you’re most curious about — we’ll personalise your home.</p>
      <div class="sy-tile-list">
        <label class="sy-tile">
          <span class="sy-tile__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.4-7-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6.6-7 11-7 11z" fill="currentColor" fill-opacity=".15"/></svg></span>
          <div class="sy-tile__body">
            <div class="sy-tile__title">Love &amp; Relationships</div>
            <div class="sy-tile__sub">Compatibility, marriage timing, conflicts</div>
          </div>
          <input type="checkbox" style="accent-color: var(--sy-gold-2);" />
        </label>
        <label class="sy-tile">
          <span class="sy-tile__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v13H3z"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg></span>
          <div class="sy-tile__body">
            <div class="sy-tile__title">Career &amp; Business</div>
            <div class="sy-tile__sub">Job changes, promotions, business luck</div>
          </div>
          <input type="checkbox" style="accent-color: var(--sy-gold-2);" />
        </label>
        <label class="sy-tile">
          <span class="sy-tile__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14.5 14.5 0 0 1 0 18M12 3a14.5 14.5 0 0 0 0 18"/></svg></span>
          <div class="sy-tile__body">
            <div class="sy-tile__title">Wealth &amp; Finance</div>
            <div class="sy-tile__sub">Money, investments, prosperity yogas</div>
          </div>
          <input type="checkbox" style="accent-color: var(--sy-gold-2);" />
        </label>
        <label class="sy-tile">
          <span class="sy-tile__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C9 6 7 8 7 12a5 5 0 0 0 10 0c0-2-1-4-3-6-1 2-2 2-2 0z"/></svg></span>
          <div class="sy-tile__body">
            <div class="sy-tile__title">Health &amp; Wellness</div>
            <div class="sy-tile__sub">Daily energy, mental peace, ayurveda</div>
          </div>
          <input type="checkbox" style="accent-color: var(--sy-gold-2);" />
        </label>
      </div>
    </section>

    <div class="reg-actions">
      <button class="sy-btn sy-btn--ghost" id="prevBtn">BACK</button>
      <button class="sy-btn sy-btn--primary" id="nextBtn">CONTINUE</button>
    </div>
  </div>

  <script src="../../assets/app-shell.js"></script>
  <script>
    var step = 1;
    var totalSteps = 3;
    var sections = [document.getElementById('step1'), document.getElementById('step2'), document.getElementById('step3')];
    var dots = [document.getElementById('d1'), document.getElementById('d2'), document.getElementById('d3')];
    var bar = document.getElementById('bar');
    function render() {
      sections.forEach(function (s, i) { s.hidden = (i + 1) !== step; });
      dots.forEach(function (d, i) { d.classList.toggle('is-active', (i + 1) <= step); });
      bar.style.width = (step / totalSteps * 100) + '%';
      document.getElementById('nextBtn').textContent = step === totalSteps ? 'CREATE ACCOUNT' : 'CONTINUE';
      document.getElementById('prevBtn').textContent = step === 1 ? 'CANCEL' : 'BACK';
    }
    function currentForm() {
      if (step === 1) return document.getElementById('step1Form');
      if (step === 2) return document.getElementById('step2Form');
      return null;
    }
    function captureStep() {
      var f = currentForm();
      if (!f) return true;
      if (!SY.validateForm(f)) {
        SY.toast('Please fill the highlighted fields', 'error');
        return false;
      }
      var data = {};
      Array.prototype.forEach.call(f.elements, function (el) {
        if (el.name) data[el.name] = el.value;
      });
      if (data.name) data.firstName = data.name.split(' ')[0];
      SY.setUser(data);
      return true;
    }
    function next() {
      if (!captureStep()) return;
      if (step === totalSteps) {
        var prefs = [];
        document.querySelectorAll('#step3 .sy-tile input:checked').forEach(function (i) {
          prefs.push(i.closest('.sy-tile').querySelector('.sy-tile__title').textContent);
        });
        SY.setUser({ preferences: prefs, loggedIn: true });
        SY.toast('Account created · welcome to Shree Yantra', 'success');
        setTimeout(function () { location.href = "../subscribenow-page/index.html"; }, 700);
        return;
      }
      step++; render(); window.scrollTo(0,0);
    }
    function prev() {
      if (step === 1) { location.href = "../signin/index.html"; return; }
      step--; render(); window.scrollTo(0,0);
    }
    window.next = next;
    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('prevBtn').addEventListener('click', prev);
    document.getElementById('backBtn').addEventListener('click', prev);

    // Pre-fill on revisit
    (function rehydrate () {
      var u = SY.getUser();
      ['name','email','mobile'].forEach(function (k) {
        var el = document.querySelector('#step1Form [name="' + k + '"]');
        if (el && u[k]) el.value = u[k];
      });
      ['dob','tob','place'].forEach(function (k) {
        var el = document.querySelector('#step2Form [name="' + k + '"]');
        if (el && u[k]) el.value = u[k];
      });
    })();

    render();
  </script>
</body>
</html>
