<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../../assets/theme-init.js"></script>
  <title>Payment · Shree Yantra</title>
  <link rel="stylesheet" href="../../assets/app-shell.css" />
  <link rel="stylesheet" href="../../assets/sy-pages.css" />
  <style>
    .pay-shell { max-width: var(--sy-shell-max); margin: 0 auto; padding: 18px; }
    .pay-summary {
      padding: 20px;
      border-radius: 22px;
      border: 1px solid rgba(201,150,46,0.34);
      background:
        radial-gradient(circle at 18% 0%, rgba(252,232,168,0.14), transparent 42%),
        linear-gradient(180deg, rgba(0,0,0,0.95), rgba(6,6,8,0.98));
      box-shadow: 0 18px 44px rgba(0,0,0,0.46), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .pay-kicker {
      margin: 0 0 6px;
      color: var(--sy-gold-2);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .pay-title {
      margin: 0;
      color: var(--sy-gold-1);
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      line-height: 1.15;
    }
    .pay-copy { margin: 9px 0 0; color: rgba(243,231,196,0.78); font-size: 13px; line-height: 1.55; }
    .pay-price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 18px;
      color: #fff7d6;
    }
    .pay-price b { font-size: 34px; color: var(--sy-gold-1); }
    .pay-price span { font-size: 12px; color: rgba(243,231,196,0.72); }
    .pay-methods { display: grid; gap: 10px; margin-top: 18px; }
    .pay-method {
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(201,150,46,0.22);
      background: rgba(0,0,0,0.72);
      color: rgba(243,231,196,0.86);
      cursor: pointer;
    }
    .pay-method[aria-pressed="true"] {
      border-color: rgba(246,210,122,0.62);
      background:
        radial-gradient(circle at 12% 0%, rgba(246,210,122,0.14), transparent 48%),
        rgba(18,16,36,0.92);
      box-shadow: 0 0 0 1px rgba(246,210,122,0.12), 0 12px 28px rgba(0,0,0,0.32);
    }
    .pay-method svg { width: 24px; height: 24px; color: var(--sy-gold-1); flex: none; }
    .pay-method strong { display: block; color: #fff7d6; font-size: 14px; }
    .pay-method small { display: block; margin-top: 2px; color: rgba(216,203,168,0.68); font-size: 11px; }
    .pay-card-fields { display: grid; gap: 10px; margin-top: 14px; }
    .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pay-primary {
      width: 100%;
      height: 54px;
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      color: #211300;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fce8a8 0%, #e9b850 48%, #b87f1a 100%);
      box-shadow: 0 12px 30px rgba(233,184,80,0.32), inset 0 1px 0 rgba(255,255,255,0.44);
    }
    .pay-secure {
      display: flex;
      justify-content: center;
      gap: 8px;
      align-items: center;
      margin: 14px 0 0;
      color: rgba(216,203,168,0.72);
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    .pay-secure svg { width: 14px; height: 14px; color: var(--sy-gold-2); }
  </style>
</head>
<body>
  <header class="sy-topbar">
    <button class="sy-topbar__btn" data-sy-go="subscribenow" aria-label="Back" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="sy-topbar__title">Payment</div>
    <button class="sy-topbar__btn" data-sy-go="notifications" aria-label="Notifications" type="button">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
    </button>
  </header>

  <main class="pay-shell">
    <section class="pay-summary">
      <p class="pay-kicker">Secure checkout</p>
      <h1 class="pay-title">Activate Premium Trial</h1>
      <p class="pay-copy">Review payment details and unlock predictions, kundli analysis and Divine Library access.</p>
      <div class="pay-price"><b>₹1</b><span>for 7 days, then ₹499/month</span></div>

      <div class="pay-methods" aria-label="Payment methods">
        <button class="pay-method" type="button" aria-pressed="true" data-method="upi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 19 10 5h4l-5 14z"/><path d="M12 19 17 5h2l-5 14z"/></svg>
          <span><strong>UPI</strong><small>PhonePe, Google Pay, Paytm</small></span>
        </button>
        <button class="pay-method" type="button" aria-pressed="false" data-method="card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18M7 15h4"/></svg>
          <span><strong>Card</strong><small>Visa, Mastercard, RuPay</small></span>
        </button>
      </div>

      <div class="pay-card-fields">
        <label class="sy-field"><div class="sy-field__body"><span class="sy-field__label">UPI ID / Mobile</span><input id="payId" type="text" placeholder="raj@upi or +91 98XXXXXXXX" /></div></label>
        <div class="pay-grid">
          <label class="sy-field"><div class="sy-field__body"><span class="sy-field__label">Trial Amount</span><input value="₹1" readonly /></div></label>
          <label class="sy-field"><div class="sy-field__body"><span class="sy-field__label">Renews</span><input value="₹499/mo" readonly /></div></label>
        </div>
      </div>

      <button class="pay-primary" type="button">Pay ₹1 & Activate</button>
      <div class="pay-secure">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        Razorpay-style secure payment preview
      </div>
    </section>
  </main>

  <script src="../../assets/app-shell.js"></script>
  <script>
    document.querySelectorAll('.pay-method').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.pay-method').forEach(function (b) { b.setAttribute('aria-pressed', 'false'); });
        btn.setAttribute('aria-pressed', 'true');
        var id = document.getElementById('payId');
        if (id) id.placeholder = btn.getAttribute('data-method') === 'card' ? 'Card ending 4242' : 'raj@upi or +91 98XXXXXXXX';
      });
    });
    document.querySelector('.pay-primary').addEventListener('click', function () {
      if (window.SY) {
        SY.toast('Payment successful', 'success');
        setTimeout(function () { SY.go('subscription-activated'); }, 500);
      } else {
        location.href = '../subscription-activated/index.html';
      }
    });
  </script>
</body>
</html>
