<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../../assets/theme-init.js"></script>
  <title>Edit Profile · Shree Yantra</title>
  <link rel="stylesheet" href="../../assets/app-shell.css" />
  <link rel="stylesheet" href="../../assets/sy-pages.css" />
  <style>
    .ep-avatar {
      width: 110px; height: 110px;
      margin: 0 auto 14px;
      position: relative;
    }
    .ep-avatar__ring {
      width: 110px; height: 110px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(160deg, #fce8a8 0%, #e9b850 35%, #8a6418 65%, #c9962e 100%);
      box-shadow: 0 0 0 6px rgba(233, 184, 80, 0.08), 0 0 26px rgba(233, 184, 80, 0.3);
    }
    .ep-avatar__inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #1a1530 0%, #07071a 75%);
      display: grid; place-items: center; overflow: hidden;
    }
    .ep-avatar__inner svg { width: 58px; height: 58px; color: var(--sy-gold-1); }
    .ep-avatar__edit {
      position: absolute;
      right: 0; bottom: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #07071a;
      border: 1.5px solid var(--sy-gold-1);
      color: var(--sy-gold-1);
      display: grid; place-items: center;
      cursor: pointer;
    }
    .ep-actions {
      display: flex; gap: 10px; margin-top: 18px;
    }
    .ep-actions .sy-btn { flex: 1; min-height: 50px; }
  </style>
</head>
<body>
  <header class="sy-topbar">
    <button class="sy-topbar__btn" data-sy-go="profile" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="sy-topbar__title">Edit Profile</div>
    <button class="sy-topbar__btn" data-menu-toggle aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </header>

  <main class="sy-container">
    <section class="sy-card" style="padding:22px 18px; text-align:center;">
      <div class="ep-avatar">
        <div class="ep-avatar__ring">
          <div class="ep-avatar__inner" data-sy-avatar>
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4.2"/><path d="M3.6 21c.7-4.4 4.3-7 8.4-7s7.7 2.6 8.4 7z"/></svg>
          </div>
        </div>
        <button class="ep-avatar__edit" type="button" id="epAvatarPick" aria-label="Change avatar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h4l2-3h6l2 3h4v13H3z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <input type="file" id="epAvatarFile" accept="image/*" hidden>
      </div>
      <p class="sy-muted sy-small">Keep your details up to date for accurate predictions.</p>
    </section>

    <h3 class="sy-section-title">Personal Details</h3>
    <section class="sy-card">
      <form class="sy-form" id="epForm" novalidate>
        <label class="sy-field" data-required>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c.7-4.4 4-7 8-7s7.3 2.6 8 7"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Full Name</span>
            <input name="name" type="text" value="Raj Kumar" />
            <span class="sy-field__error">Required</span>
          </div>
        </label>
        <label class="sy-field" data-required data-email>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><polyline points="4 4 12 13 20 4"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Email</span>
            <input name="email" type="email" value="raj.kumar@cosmos.com" />
            <span class="sy-field__error">Enter a valid email</span>
          </div>
        </label>
        <label class="sy-field" data-required data-min="10">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92V21a1 1 0 0 1-1.11 1A19.94 19.94 0 0 1 2 4.11 1 1 0 0 1 3 3h4a1 1 0 0 1 1 .75l1.5 6a1 1 0 0 1-.27 1L7 13a16 16 0 0 0 4 4l2.25-2.23a1 1 0 0 1 1-.27l6 1.5A1 1 0 0 1 22 17z"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Mobile Number</span>
            <input name="mobile" type="tel" value="+91 98765 43210" />
            <span class="sy-field__error">Enter a valid mobile number</span>
          </div>
        </label>
      </form>
    </section>

    <h3 class="sy-section-title">Birth Details</h3>
    <section class="sy-card">
      <form class="sy-form" id="epBirth" novalidate>
        <div class="sy-grid-2">
          <label class="sy-field" data-required>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <div class="sy-field__body">
              <span class="sy-field__label">Date of Birth</span>
              <input name="dob" type="date" value="2000-01-01" />
              <span class="sy-field__error">Required</span>
            </div>
          </label>
          <label class="sy-field" data-required>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <div class="sy-field__body">
              <span class="sy-field__label">Time of Birth</span>
              <input name="tob" type="time" value="06:42" />
              <span class="sy-field__error">Required</span>
            </div>
          </label>
        </div>
        <label class="sy-field" data-required>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Place of Birth</span>
            <input name="place" type="text" value="Jaipur, Rajasthan" />
            <span class="sy-field__error">Required</span>
          </div>
        </label>
        <label class="sy-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 1-3 3 3 3 0 0 1 3-3z"/><path d="M5 19a7 7 0 0 1 14 0"/></svg>
          <div class="sy-field__body">
            <span class="sy-field__label">Gender</span>
            <select name="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </label>
      </form>
    </section>

    <div class="ep-actions">
      <button class="sy-btn sy-btn--ghost" data-sy-go="profile">CANCEL</button>
      <button class="sy-btn sy-btn--primary" id="saveBtn">SAVE CHANGES</button>
    </div>
  </main>

  <script src="../../assets/app-shell.js"></script>
  <script>
    (function () {
      var u = SY.getUser();
      ['name','email','mobile'].forEach(function (k) {
        var el = document.querySelector('#epForm [name="' + k + '"]');
        if (el && u[k]) el.value = u[k];
      });
      ['dob','tob','place','gender'].forEach(function (k) {
        var el = document.querySelector('#epBirth [name="' + k + '"]');
        if (el && u[k]) el.value = u[k];
      });
      // Avatar picker (shares the same compression + storage as profile page)
      var pickBtn = document.getElementById('epAvatarPick');
      var pickFile = document.getElementById('epAvatarFile');
      pickBtn.addEventListener('click', function () { pickFile.click(); });
      pickFile.addEventListener('change', function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        if (!/^image\//.test(file.type)) { SY.toast('Please choose an image file', 'error'); return; }
        if (file.size > 4 * 1024 * 1024) { SY.toast('Image must be under 4 MB', 'error'); return; }
        var reader = new FileReader();
        reader.onload = function (ev) {
          var img = new Image();
          img.onload = function () {
            var max = 512, w = img.width, h = img.height;
            if (w > h && w > max) { h = h * max / w; w = max; }
            else if (h > max)     { w = w * max / h; h = max; }
            var cv = document.createElement('canvas');
            cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            var data; try { data = cv.toDataURL('image/jpeg', 0.86); } catch (_) { data = ev.target.result; }
            try { SY.setUser({ avatar: data }); SY.paintAvatar(); SY.toast('Photo updated', 'success'); }
            catch (_) { SY.toast('Image too large for storage', 'error'); }
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        pickFile.value = '';
      });

      document.getElementById('saveBtn').addEventListener('click', function () {
        var f1 = document.getElementById('epForm');
        var f2 = document.getElementById('epBirth');
        if (!SY.validateForm(f1) || !SY.validateForm(f2)) {
          SY.toast('Please fix the highlighted fields', 'error');
          return;
        }
        var data = {};
        Array.prototype.forEach.call(f1.elements, function (el) { if (el.name) data[el.name] = el.value; });
        Array.prototype.forEach.call(f2.elements, function (el) { if (el.name) data[el.name] = el.value; });
        if (data.name) data.firstName = data.name.split(' ')[0];
        SY.setUser(data);
        SY.toast('Profile updated', 'success');
        setTimeout(function () { location.href = '../profile-page/index.html'; }, 700);
      });
    })();
  </script>
</body>
</html>
